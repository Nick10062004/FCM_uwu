<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการงานซ่อม - Zeta Technician</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Prompt:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar technician">
            <div class="logo">
                <div class="logo-icon">
                    <ion-icon name="construct" size="large"></ion-icon>
                </div>
                <h2>Zeta Tech</h2>
            </div>

            <nav>
                <ul class="nav-links">
                    <li><a href="index.html" class="nav-item active">
                            <ion-icon name="clipboard-outline"></ion-icon>
                            <span>รายการงาน</span>
                        </a></li>
                    <li><a href="calendar.html" class="nav-item">
                            <ion-icon name="calendar-outline"></ion-icon>
                            <span>ตารางงาน</span>
                        </a></li>
                    <li><a href="profile.html" class="nav-item">
                            <ion-icon name="person-outline"></ion-icon>
                            <span>โปรไฟล์</span>
                        </a></li>
                    <li><a href="settings.html" class="nav-item">
                            <ion-icon name="settings-outline"></ion-icon>
                            <span>ตั้งค่า</span>
                        </a></li>
                </ul>
            </nav>

            <div class="logout-box">
                <button class="btn btn-logout" onclick="confirmLogout()">
                    <ion-icon name="log-out-outline"></ion-icon>
                    ออกจากระบบ
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1>งานที่ได้รับมอบหมาย</h1>
                <p class="header-meta">สวัสดี ช่างวิชัย | วันนี้คุณมี 3 งานที่ต้องดำเนินการ</p>
            </header>

            <!-- Filters -->
            <div class="category-tabs" style="margin-bottom: 2rem;">
                <button class="tab-btn active" data-filter="all">ทั้งหมด</button>
                <button class="tab-btn" data-filter="working">กำลังทำ</button>
                <button class="tab-btn" data-filter="pending">รอดำเนินการ</button>
                <button class="tab-btn" data-filter="done">สำเร็จแล้ว</button>
            </div>

            <!-- Task Grid -->
            <div id="techTaskList" class="furniture-grid">
                <!-- Task items will be rendered here by app.js -->
                <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted);">
                    <div class="loader"></div>
                    <p style="margin-top: 1rem;">กำลังโหลดรายการงานของคุณ...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="../app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Force Tech View rendering
            if (typeof renderTechTasks === 'function') {
                renderTechTasks('all');
            }
        });
    </script>
</body>

</html>
