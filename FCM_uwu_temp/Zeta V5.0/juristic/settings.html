<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่าผู้ดูแล - Zeta Juristic</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Prompt:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar juristic">
            <div class="logo">
                <div class="logo-icon">
                    <ion-icon name="business" size="large"></ion-icon>
                </div>
                <h2>Zeta Admin</h2>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html" class="nav-item">
                            <ion-icon name="stats-chart-outline"></ion-icon>
                            <span>แดชบอร์ด</span>
                        </a></li>
                    <li><a href="requests.html" class="nav-item">
                            <ion-icon name="clipboard-outline"></ion-icon>
                            <span>จัดการงานซ่อม</span>
                        </a></li>
                    <li><a href="technicians.html" class="nav-item">
                            <ion-icon name="people-outline"></ion-icon>
                            <span>รายชื่อช่าง</span>
                        </a></li>
                    <li><a href="profile.html" class="nav-item">
                            <ion-icon name="person-outline"></ion-icon>
                            <span>โปรไฟล์</span>
                        </a></li>
                    <li><a href="settings.html" class="nav-item active">
                            <ion-icon name="settings-outline"></ion-icon>
                            <span>ตั้งค่า</span>
                        </a></li>
                </ul>
            </nav>

            <div class="logout-box">
                <button class="btn btn-logout" onclick="confirmLogout()">
                    <ion-icon name="log-out-outline"></ion-icon>
                    ออกจากระบบ
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1>ตั้งค่าระบบ</h1>
                <p class="header-meta">ปรับแต่งการทำงานของส่วนจัดการนิติบุคคล</p>
            </header>

            <div style="max-width: 800px; margin: 0 auto;">
                <section class="card settings-section animate-fade-in">
                    <h3>ธีมหลังบ้าน</h3>
                    <div class="theme-selector">
                        <div class="theme-option" data-theme="light" onclick="setTheme('light', true)">
                            <div class="theme-preview" style="background: #f8fafc; border: 1px solid #e2e8f0;"></div>
                            <span>สว่าง</span>
                        </div>
                        <div class="theme-option" data-theme="dark" onclick="setTheme('dark', true)">
                            <div class="theme-preview" style="background: #0f172a; border: 1px solid #334155;"></div>
                            <span>มืด</span>
                        </div>
                    </div>
                </section>

                <section class="card settings-section animate-fade-in" style="animation-delay: 0.1s;">
                    <h3>การจัดการความรักษาความปลอดภัย</h3>
                    <div class="settings-group">
                        <div class="setting-row">
                            <span>บังคับตั้ง PIN สำหรับสมาชิกลงทะเบียนใหม่</span>
                            <label class="switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-row">
                            <span>แจ้งเตือนเมื่องานค้างเกิน 24 ชม.</span>
                            <label class="switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </section>

                <div class="settings-actions">
                    <button class="btn btn-primary" onclick="alert('บันทึกสำเร็จ')">บันทึกข้อมูล</button>
                </div>
            </div>
        </main>
    </div>

    <script src="../app.js"></script>
</body>

</html>
