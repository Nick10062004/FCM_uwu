<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeta Estate - Routing...</title>
    <style>
        body {
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #e2e8f0;
            border-bottom-color: #2563eb;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="loader"></div>

    <script>
        // --- Gatekeeper Logic ---
        function route() {
            const loggedIn = localStorage.getItem('zeta_logged_in') === 'true';
            const role = localStorage.getItem('zeta_role') || 'resident';
            const pinVerified = localStorage.getItem('zeta_pin_verified') === 'true';

            // Artificial delay for smooth transition (optional)
            setTimeout(() => {
                if (!loggedIn) {
                    window.location.href = 'auth/login.html';
                } else if (!pinVerified) {
                    window.location.href = 'auth/pin-verify.html';
                } else {
                    if (role === 'resident') {
                        window.location.href = 'resident/index.html';
                    } else if (role === 'juristic') {
                        window.location.href = 'juristic/index.html';
                    } else if (role === 'technician') {
                        window.location.href = 'technician/index.html';
                    } else {
                        window.location.href = 'auth/login.html';
                    }
                }
            }, 300);
        }

        route();
    </script>
</body>

</html>
