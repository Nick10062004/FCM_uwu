<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่ารหัส PIN - Zeta Estate</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Prompt:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="../style.css">
</head>

<body class="auth-page">
    <div class="card animate-fade-in" style="width: 400px; padding: 3rem; text-align: center;">
        <div class="auth-header">
            <h1 style="font-size: 1.8rem;">ตั้งรหัส PIN</h1>
            <p style="color: var(--text-muted);">กำหนดรหัสผ่าน 6 หลักเพื่อความรวดเร็วในการเข้าใช้งานครั้งต่อไป</p>
        </div>

        <div class="pin-display" id="pinDisplay">
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
        </div>

        <div class="numpad">
            <button class="num-btn" onclick="handlePinInput('1')">1</button>
            <button class="num-btn" onclick="handlePinInput('2')">2</button>
            <button class="num-btn" onclick="handlePinInput('3')">3</button>
            <button class="num-btn" onclick="handlePinInput('4')">4</button>
            <button class="num-btn" onclick="handlePinInput('5')">5</button>
            <button class="num-btn" onclick="handlePinInput('6')">6</button>
            <button class="num-btn" onclick="handlePinInput('7')">7</button>
            <button class="num-btn" onclick="handlePinInput('8')">8</button>
            <button class="num-btn" onclick="handlePinInput('9')">9</button>
            <button class="num-btn" style="background: transparent; border: none;"></button>
            <button class="num-btn" onclick="handlePinInput('0')">0</button>
            <button class="num-btn" onclick="handlePinInput('back')" style="background: var(--bg-main);">
                <ion-icon name="backspace-outline"></ion-icon>
            </button>
        </div>

        <button id="btn-save-pin" class="btn btn-primary"
            style="width: 100%; padding: 1rem; margin-top: 2rem; font-size: 1rem;" disabled onclick="savePin()">
            บันทึกรหัส PIN
        </button>
    </div>

    <script src="../app.js"></script>
</body>

</html>
