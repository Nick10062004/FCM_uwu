<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Zeta Estate</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Prompt:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="../style.css">
</head>

<body class="auth-page">
    <div class="auth-container animate-fade-in">
        <div class="auth-visual">
            <div class="logo" style="border-bottom: none;">
                <ion-icon name="home" style="font-size: 2.5rem;"></ion-icon>
                <h2 style="font-size: 1.8rem; margin-top: 10px;" data-i18n="welcome_title">Zeta Estate</h2>
            </div>
            <div>
                <h2 style="font-size: 2.5rem; line-height: 1.2; margin-bottom: 1rem;" data-i18n="welcome_back">ยินดีต้อนรับกลับบ้าน<br>สัมผัสความสะดวกสบายในมือคุณ</h2>
                <p style="opacity: 0.8;" data-i18n="manage_everything">จัดการทุกอย่างเกี่ยวกับบ้านของคุณได้ในที่เดียว</p>
            </div>
            <div style="font-size: 0.9rem; opacity: 0.6;" data-i18n="footer_text">© 2026 Zeta Estate Residence Portal</div>
        </div>

        <div class="auth-form-side" style="position: relative;">
            <div style="position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; font-size: 0.9rem;">
                <span class="lang-btn" data-lang="th" style="cursor: pointer;" onclick="changeLanguage('th')">TH</span>
                <span class="lang-btn" data-lang="en" style="cursor: pointer;" onclick="changeLanguage('en')">EN</span>
                <span class="lang-btn" data-lang="zh" style="cursor: pointer;" onclick="changeLanguage('zh')">ZH</span>
            </div>
            
            <div class="auth-header">
                <h1 data-i18n="login">เข้าสู่ระบบ</h1>
                <p style="color: var(--text-muted);" data-i18n="login_desc">กรุณากรอกข้อมูลเพื่อเข้าสู่บัญชีของคุณ</p>
            </div>

            <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
                <div class="form-group">
                    <label for="login-email" data-i18n="email">อีเมล</label>
                    <input type="email" id="login-email" class="input-auth" placeholder="example@email.com" data-i18n-placeholder="email_placeholder" required>
                </div>
                <div class="form-group">
                    <label for="login-password" data-i18n="password">รหัสผ่าน</label>
                    <input type="password" id="login-password" class="input-auth" placeholder="••••••••" data-i18n-placeholder="password_placeholder" required>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; padding: 1rem; margin-top: 1rem; font-size: 1rem;" data-i18n="login">
                    เข้าสู่ระบบ
                </button>
            </form>

            <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem;">
                <span style="color: var(--text-muted);" data-i18n="no_account">ยังไม่มีบัญชีลูกบ้าน?</span>
                <a href="register.html"
                    style="color: var(--primary); font-weight: 600; margin-left: 5px;" data-i18n="register_here">ลงทะเบียนที่นี่</a>
            </div>
        </div>
    </div>

    <script src="../translations.js"></script>
    <script src="../app.js"></script>
</body>

</html>
