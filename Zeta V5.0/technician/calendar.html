<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ปฏิทินงาน - Zeta Technician</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Prompt:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar technician">
            <div class="logo">
                <div class="logo-icon">
                    <ion-icon name="construct" size="large"></ion-icon>
                </div>
                <h2>Zeta Tech</h2>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html" class="nav-item">
                            <ion-icon name="clipboard-outline"></ion-icon>
                            <span>รายการงาน</span>
                        </a></li>
                    <li><a href="calendar.html" class="nav-item active">
                            <ion-icon name="calendar-outline"></ion-icon>
                            <span>ตารางงาน</span>
                        </a></li>
                    <li><a href="profile.html" class="nav-item">
                            <ion-icon name="person-outline"></ion-icon>
                            <span>โปรไฟล์</span>
                        </a></li>
                    <li><a href="settings.html" class="nav-item">
                            <ion-icon name="settings-outline"></ion-icon>
                            <span>ตั้งค่า</span>
                        </a></li>
                </ul>
            </nav>

            <div class="logout-box">
                <button class="btn btn-logout" onclick="confirmLogout()">
                    <ion-icon name="log-out-outline"></ion-icon>
                    ออกจากระบบ
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1>ตารางงานของคุณ</h1>
                <p class="header-meta">ตรวจสอบตารางการนัดหมายและวางแผนการทำงาน</p>
            </header>

            <div style="display: grid; grid-template-columns: 1fr 350px; gap: 2rem; align-items: start;">
                <div class="card animate-fade-in">
                    <div id="techCalendarContainer">
                        <!-- Global renderCalendar will be used here -->
                    </div>
                </div>

                <div class="card animate-fade-in" id="dailyAgendaContainer"
                    style="background: var(--bg-main); border-style: dashed;">
                    <div style="padding: 3rem; text-align: center; color: var(--text-muted);">
                        <ion-icon name="calendar-outline" style="font-size: 2.5rem; margin-bottom: 1rem;"></ion-icon>
                        <p>เลือกวันที่บนปฏิทินเพื่อดูรายการงาน</p>
                    </div>
                </div>
            </div>

            <div class="card" style="margin-top: 2rem;">
                <h3>รายการที่ใกล้ถึงกำหนด</h3>
                <div id="upcomingTasksList" style="margin-top: 1rem; display: flex; flex-direction: column; gap: 1rem;">
                    <!-- Upcoming tasks will be listed here -->
                </div>
            </div>
        </main>
    </div>

    <script src="../app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTechCalendar();
        });

        function initTechCalendar() {
            // Find current tech (mock: 'ช่างวิชัย')
            const tech = technicians.find(t => t.name === 'ช่างวิชัย');
            if (tech && typeof renderCalendar === 'function') {
                const now = new Date();
                const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

                renderCalendar(tech, document.getElementById('techCalendarContainer'), null, todayStr);
                renderDailyAgenda(tech, todayStr);
                renderUpcomingTasks(tech);
            }
        }

        function renderUpcomingTasks(tech) {
            const list = document.getElementById('upcomingTasksList');
            if (!list || !tech.assignedJobs) return;

            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = tomorrow.toISOString().split('T')[0];

            const upcoming = tech.assignedJobs.filter(j => j.date >= tomorrowStr).sort((a, b) => a.date.localeCompare(b.date));

            if (upcoming.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted); font-size: 0.9rem;">ไม่มีงานที่ใกล้จะถึง</p>';
                return;
            }

            list.innerHTML = upcoming.map(j => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: var(--bg-main); border-radius: 12px; border: 1px solid var(--border);">
                    <div>
                        <p style="font-weight: 700; font-size: 0.95rem;">${j.title}</p>
                        <p style="font-size: 0.8rem; color: var(--text-muted);">${new Date(j.date).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' })}</p>
                    </div>
                    <ion-icon name="chevron-forward-outline" style="color: var(--gold);"></ion-icon>
                </div>
            `).join('');
        }
    </script>
</body>

</html>
